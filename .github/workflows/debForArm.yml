name: Build iptux ARM64 DEB

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    # 设置 QEMU
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
      with:
        platforms: arm64
    
    # 设置 Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    # 使用 Docker 和 QEMU 创建 ARM64 构建环境
    - name: Set up ARM64 build environment
      run: |
        # 创建构建脚本
        cat > build.sh << 'EOF'
        #!/bin/bash
        set -ex
        
        # 更新包列表
        apt-get update
        
        # 安装构建依赖
        DEBIAN_FRONTEND=noninteractive apt-get install -y \
          git \
          meson \
          ninja-build \
          dpkg-dev \
          debhelper \
          cmake \
          gcc \
          g++ \
          libgoogle-glog-dev \
          libgtk-3-dev \
            git \
            meson \
            ninja-build \
            dpkg-dev \
            debhelper \
            cmake \
            gcc \
            g++ \
            libgoogle-glog-dev \
            libgtk-3-dev \
            libglib2.0-dev \
            libjsoncpp-dev \
            libsigc++-2.0-dev \
            libayatana-appindicator3-dev \
            appstream \
            gettext \
            dh-make
        
        # 克隆并构建 iptux
        git clone https://github.com/iptux-src/iptux.git
        cd iptux
        git checkout ${VERSION}
        dpkg-buildpackage -b -us -uc
        cd ..
        mv *.deb /output/iptux-${VERSION}-arm64.deb
        EOF
        
        chmod +x build.sh
        mkdir -p output
    
    - name: Build iptux in ARM64 environment
      run: |
        docker run --rm --platform linux/arm64 \
          -v $PWD:/work \
          -v $PWD/output:/output \
          -e VERSION=${{ github.event.inputs.version }} \
          -w /work \
          ubuntu:22.04 \
          ./build.sh
    
    - name: Upload DEB package
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64
        path: output/iptux-${{ github.event.inputs.version }}-arm64.deb
        retention-days: 7
        
    - name: Generate checksum
      run: |
        cd output
        sha256sum iptux-${{ github.event.inputs.version }}-arm64.deb > iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        
    - name: Upload checksum
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64-checksum
        path: output/iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        retention-days: 7 
