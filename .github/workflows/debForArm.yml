name: Build iptux ARM64 DEB

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    # 配置 ARM64 源
    - name: Configure ARM64 repositories
      run: |
        # 备份原有源文件
        sudo cp /etc/apt/sources.list /etc/apt/sources.list.bak
        
        # 创建新的源文件
        sudo tee /etc/apt/sources.list.d/arm64.list << EOF
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy main restricted
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates main restricted
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy universe
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates universe
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-updates multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-backports main restricted universe multiverse
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security main restricted
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security universe
        deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports jammy-security multiverse
        EOF
        
        # 添加 ARM64 架构
        sudo dpkg --add-architecture arm64
        
        # 更新包列表
        sudo apt-get update
    
    # 安装依赖
    - name: Install Dependencies
      run: |
        # 安装交叉编译工具
        sudo apt-get install -y \
          crossbuild-essential-arm64 \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          qemu-user-static
        
        # 安装构建工具
        sudo apt-get install -y \
          git \
          meson \
          ninja-build \
          dpkg-dev \
          debhelper \
          cmake
        
        # 安装 ARM64 库
        sudo apt-get install -y \
          libgoogle-glog-dev:arm64 \
          libgtk-3-dev:arm64 \
          libglib2.0-dev:arm64 \
          libjsoncpp-dev:arm64 \
          libsigc++-2.0-dev:arm64 \
          libayatana-appindicator3-dev:arm64 \
          appstream:arm64 \
          gettext
    
    - name: Setup Cross Compile Environment
      run: |
        echo "Setting up cross compilation environment..."
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=${CROSS_COMPILE}gcc
        export CXX=${CROSS_COMPILE}g++
        export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
        export DEB_BUILD_OPTIONS="parallel=$(nproc)"
    
    - name: Clone and Build iptux
      run: |
        git clone https://github.com/iptux-src/iptux.git
        cd iptux
        git checkout ${{ github.event.inputs.version }}
        dpkg-buildpackage -aarm64 -b -us -uc
        cd ..
        mv *.deb iptux-${{ github.event.inputs.version }}-arm64.deb
    
    - name: Upload DEB package
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64
        path: iptux-${{ github.event.inputs.version }}-arm64.deb
        retention-days: 7
        
    - name: Generate checksum
      run: |
        sha256sum iptux-${{ github.event.inputs.version }}-arm64.deb > iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        
    - name: Upload checksum
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64-checksum
        path: iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        retention-days: 7
