name: Build iptux ARM64 DEB

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    # 修改 apt 源配置
    - name: Configure APT
      run: |
        sudo sed -i 's/http:\/\/security.ubuntu.com/http:\/\/ports.ubuntu.com/g' /etc/apt/sources.list
        sudo sed -i 's/http:\/\/archive.ubuntu.com/http:\/\/ports.ubuntu.com/g' /etc/apt/sources.list
        
        # 添加 ARM64 架构支持
        sudo dpkg --add-architecture arm64
        
        # 更新源
        sudo apt-get update || true
    
    # 分步安装依赖
    - name: Install Cross Compile Tools
      run: |
        sudo apt-get install -y \
          crossbuild-essential-arm64 \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          qemu-user-static
    
    - name: Install Build Dependencies
      run: |
        sudo apt-get install -y \
          git \
          meson \
          ninja-build \
          dpkg-dev \
          debhelper \
          cmake
    
    - name: Install ARM64 Libraries
      run: |
        sudo apt-get install -y \
          libgoogle-glog-dev:arm64 \
          libgtk-3-dev:arm64 \
