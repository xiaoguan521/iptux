name: Build iptux ARM64 DEB

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    # 修改 apt 源并更新
    - name: Update APT sources
      run: |
        sudo apt-get update
        sudo apt-get install -y software-properties-common
        sudo add-apt-repository universe
        sudo apt-get update
    
    # 分步安装依赖
    - name: Install Cross Compile Tools
      run: |
        # 先安装交叉编译工具
        sudo apt-get install -y \
          crossbuild-essential-arm64 \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu
        
        # 单独安装 qemu
        wget http://archive.ubuntu.com/ubuntu/pool/universe/q/qemu/qemu-user-static_6.2+dfsg-2ubuntu6.11_amd64.deb
        sudo dpkg -i qemu-user-static_6.2+dfsg-2ubuntu6.11_amd64.deb || true
        sudo apt-get install -f -y
    
    # 添加 ARM64 架构支持
    - name: Add ARM64 architecture
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt-get update
    
    # 安装其他依赖
    - name: Install Build Dependencies
      run: |
        sudo apt-get install -y \
          git \
          meson \
          ninja-build \
          dpkg-dev \
          debhelper \
          cmake
    
    # 安装 ARM64 库
    - name: Install ARM64 Libraries
      run: |
        sudo apt-get install -y \
          libgoogle-glog-dev:arm64 \
          libgtk-3-dev:arm64 \
          libglib2.0-dev:arm64 \
          libjsoncpp-dev:arm64 \
          libsigc++-2.0-dev:arm64 \
          libayatana-appindicator3-dev:arm64 \
          appstream:arm64 \
          gettext
    
    - name: Setup Cross Compile Environment
      run: |
        echo "Setting up cross compilation environment..."
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=${CROSS_COMPILE}gcc
        export CXX=${CROSS_COMPILE}g++
        export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
        export DEB_BUILD_OPTIONS="parallel=$(nproc)"
    
    - name: Clone and Build iptux
      run: |
        git clone https://github.com/iptux-src/iptux.git
        cd iptux
        git checkout ${{ github.event.inputs.version }}
        dpkg-buildpackage -aarm64 -b -us -uc
        cd ..
        mv *.deb iptux-${{ github.event.inputs.version }}-arm64.deb
    
    - name: Upload DEB package
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64
        path: iptux-${{ github.event.inputs.version }}-arm64.deb
        retention-days: 7
        
    - name: Generate checksum
      run: |
        sha256sum iptux-${{ github.event.inputs.version }}-arm64.deb > iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        
    - name: Upload checksum
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64-checksum
        path: iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        retention-days: 7
