name: Build iptux ARM64 DEB

on:
  workflow_dispatch:   # 只保留手动触发
    inputs:
      version:        # 添加版本号输入
        description: 'Version number'
        required: true
        default: 'v1.0.0'
      debug:          # 添加调试模式选项
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    
    - name: Install Dependencies
      run: |
        sudo dpkg --add-architecture arm64
        sudo apt-get update
        sudo apt-get install -y \
          crossbuild-essential-arm64 \
          gcc-aarch64-linux-gnu \
          g++-aarch64-linux-gnu \
          qemu-user-static \
          git \
          libgoogle-glog-dev:arm64 \
          libgtk-3-dev:arm64 \
          libglib2.0-dev:arm64 \
          libjsoncpp-dev:arm64 \
          meson \
          libsigc++-2.0-dev:arm64 \
          libayatana-appindicator3-dev:arm64 \
          appstream \
          gettext \
          ninja-build \
          dpkg-dev \
          debhelper \
          cmake
    
    - name: Setup Cross Compile Environment
      run: |
        echo "Setting up cross compilation environment..."
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CC=${CROSS_COMPILE}gcc
        export CXX=${CROSS_COMPILE}g++
        export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
        export DEB_BUILD_OPTIONS="parallel=$(nproc)"
        
        if [ "${{ github.event.inputs.debug }}" = "true" ]; then
          echo "Debug mode enabled"
          export DEB_BUILD_OPTIONS="$DEB_BUILD_OPTIONS nostrip"
        fi
    
    - name: Clone and Build iptux
      run: |
        git clone https://github.com/iptux-src/iptux.git
        cd iptux
        git checkout ${{ github.event.inputs.version }}
        dpkg-buildpackage -aarm64 -b -us -uc
        cd ..
        mv *.deb iptux-${{ github.event.inputs.version }}-arm64.deb
    
    - name: Upload DEB package
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64
        path: iptux-${{ github.event.inputs.version }}-arm64.deb
        retention-days: 7
        
    - name: Generate checksum
      run: |
        sha256sum iptux-${{ github.event.inputs.version }}-arm64.deb > iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        
    - name: Upload checksum
      uses: actions/upload-artifact@v3
      with:
        name: iptux-${{ github.event.inputs.version }}-arm64-checksum
        path: iptux-${{ github.event.inputs.version }}-arm64.deb.sha256
        retention-days: 7
